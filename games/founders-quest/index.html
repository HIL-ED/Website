  ];

    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return false;
    if(!ac){
      ac=new AC();
      master=ac.createGain(); master.gain.value=muted?0:0.5; master.connect(ac.destination);
      musicGain=ac.createGain(); musicGain.gain.value=0.4; musicGain.connect(master);
      sfxGain=ac.createGain(); sfxGain.gain.value=0.85; sfxGain.connect(master);
    }
    if(ac.state==='suspended') ac.resume();
    return true;
  }
  function tone(freq,t0,dur,type,vol,dest,slideTo){
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t0);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,t0+dur);
    g.gain.setValueAtTime(vol,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
    o.connect(g); g.connect(dest);
    o.start(t0); o.stop(t0+dur+0.03);
  }
  function sfx(fn){ if(ensure()) fn(ac.currentTime); }

  function schedule(){
    if(!musicPlaying||!ac) return;
    const spb=60/tempo;
    while(nextTime < ac.currentTime+0.2){
      const [note,beats]=MELODY[mIdx];
      if(note>0) tone(midiF(note+12), nextTime, beats*spb*0.85, 'square', 0.14, musicGain);
      for(let b=0;b<beats;b++){ // oom-pah triangle bass under the tune
        tone(midiF((beatCount+b)%2===0?48:43), nextTime+b*spb, spb*0.8, 'triangle', 0.2, musicGain);
      }
      beatCount+=beats; nextTime+=beats*spb;
      mIdx=(mIdx+1)%MELODY.length;
    }
  }
  function startMusic(bpm){
    if(!ensure()) return;
    tempo=bpm||110; mIdx=0; beatCount=0; musicPlaying=true;
    nextTime=ac.currentTime+0.12;
    if(!lookahead) lookahead=setInterval(schedule,30);
  }
  // called every frame: full volume in play, ducked under overlays, silent on menus
  function tick(st){
    if(!ac||!musicGain) return;
    if(st==='play') musicGain.gain.setTargetAtTime(0.4, ac.currentTime, 0.15);
    else if(st==='question'||st==='levelclear') musicGain.gain.setTargetAtTime(0.12, ac.currentTime, 0.15);
    else musicPlaying=false;
  }
  function toggleMute(){ muted=!muted; if(master) master.gain.value=muted?0:0.5; }

  return {
    ensure, startMusic, tick, toggleMute,
    isMuted:()=>muted,
    jump(){ sfx(t=>tone(230,t,0.16,'square',0.4,sfxGain,680)); },
    coin(){ sfx(t=>{ tone(988,t,0.07,'square',0.4,sfxGain); tone(1319,t+0.07,0.2,'square',0.4,sfxGain); }); },
    correct(){ sfx(t=>{ [523,659,784,1047].forEach((f,i)=>tone(f,t+i*0.09,0.14,'square',0.38,sfxGain)); }); },
    wrong(){ sfx(t=>{ tone(233,t,0.18,'sawtooth',0.35,sfxGain,175); tone(175,t+0.18,0.3,'sawtooth',0.35,sfxGain,110); }); },
    stomp(){ sfx(t=>tone(320,t,0.12,'square',0.4,sfxGain,80)); },
    hurt(){ sfx(t=>tone(200,t,0.22,'sawtooth',0.4,sfxGain,70)); },
    spring(){ sfx(t=>tone(330,t,0.32,'square',0.38,sfxGain,1100)); },
    star(){ sfx(t=>{ [659,784,988,1319,1568].forEach((f,i)=>tone(f,t+i*0.07,0.12,'square',0.32,sfxGain)); }); },
    flag(){ sfx(t=>{ [523,587,659,784,880,1047].forEach((f,i)=>tone(f,t+i*0.11,0.2,'triangle',0.42,sfxGain)); }); },
    gameover(){ sfx(t=>{ [392,330,262,196].forEach((f,i)=>tone(f,t+i*0.18,0.26,'triangle',0.42,sfxGain)); }); },
    select(){ sfx(t=>tone(880,t,0.06,'square',0.3,sfxGain)); },
  };
})();

// ---------- INPUT ----------
const keys = {};
const pressed = {};
window.addEventListener('keydown', e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','Space'].includes(e.key)) e.preventDefault();
  if((e.key==='m'||e.key==='M') && !keys[e.key]) AudioSys.toggleMute();
  if(!keys[e.key]) pressed[e.key]=true;
  keys[e.key]=true;
  AudioSys.ensure();
  handleMenuKey(e.key);
});
window.addEventListener('keyup', e=>{ keys[e.key]=false; });

canvas.addEventListener('click', onPointer);
canvas.addEventListener('mousemove', onMouseMove);
canvas.addEventListener('touchstart', function(e){
  const p = touchPos(e); if(p){ handlePointer(p.x,p.y); }
}, {passive:true});

function touchPos(e){
  const t = e.changedTouches && e.changedTouches[0]; if(!t) return null;
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height) };
}
function onPointer(e){
  const r = canvas.getBoundingClientRect();
  handlePointer((e.clientX-r.left)*(W/r.width),(e.clientY-r.top)*(H/r.height));
}
function onMouseMove(e){
  if(state!=='select' && state!=='question') return;
  const r = canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  if(state==='question'){ qHover = hitAnswer(mx,my); }
}

function handlePointer(x,y){
  AudioSys.ensure();
  if(state==='title'){ startSelect(); return; }
  if(state==='select'){
    // character cards
    const cardStart = W/2 - ((CHARS.length-1)*240 + 180)/2 + 90;
    for(let i=0;i<CHARS.length;i++){
      const cx = cardStart + i*240;
      if(x>cx-90 && x<cx+90 && y>150 && y<420){ selIndex=i; }
    }
    if(x>W/2-120 && x<W/2+120 && y>450 && y<510){ beginGame(); }
    return;
  }
  if(state==='play' && x<40 && y>44 && y<64){ AudioSys.toggleMute(); return; } // speaker icon
  if(state==='question'){
    if(questionData && questionData.reveal!=null){ resolveWrong(); return; }
    const idx = hitAnswer(x,y);
    if(idx>=0 && !(questionData && idx===questionData.elim)) answerQuestion(idx);
    return;
  }
  if(state==='win' || state==='gameover'){ state='title'; return; }
  if(state==='levelclear'){ nextLevel(); return; }
}
function handleMenuKey(k){
  if(state==='title' && (k===' '||k==='Enter'||k==='Space')) startSelect();
  else if(state==='select'){
    if(k==='ArrowLeft') selIndex=(selIndex+CHARS.length-1)%CHARS.length;
    else if(k==='ArrowRight') selIndex=(selIndex+1)%CHARS.length;
    else if(k==='Enter'||k===' '||k==='Space') beginGame();
  } else if(state==='question'){
    if(questionData && questionData.reveal!=null){
      if(k==='Enter'||k===' '||k==='Space') resolveWrong();
    } else {
      const map={'1':0,'2':1,'3':2,'4':3};
      if(k in map && map[k]!==(questionData&&questionData.elim)) answerQuestion(map[k]);
    }
  } else if(state==='levelclear' && (k==='Enter'||k===' '||k==='Space')) nextLevel();
  else if((state==='win'||state==='gameover') && (k==='Enter'||k===' '||k==='Space')) state='title';
}
function hitAnswer(x,y){
  for(let i=0;i<4;i++){
    const by = 300 + i*52;
    if(x>140 && x<820 && y>by-22 && y<by+22) return i;
  }
  return -1;
}

// touch move buttons
function bindHold(id,key){
  const el=document.getElementById(id);
  const on=e=>{ e.preventDefault(); AudioSys.ensure(); keys[key]=true; if(key==='ArrowUp') pressed[key]=true; };
  const off=e=>{ e.preventDefault(); keys[key]=false; };
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
}
bindHold('tleft','ArrowLeft'); bindHold('tright','ArrowRight'); bindHold('tjump','ArrowUp');

// ---------- FLOW ----------
function startSelect(){ state='select'; selIndex=0; }
function beginGame(){
  charData = CHARS[selIndex];
  levelIdx = 0; score=0; hearts=charData.maxHearts; answeredCount=0; usedQ.clear();
  loadLevel(0);
  state='play';
}
function loadLevel(i){
  levelIdx=i; level=JSON.parse(JSON.stringify(LEVELS[i]));
  level.enemies.forEach(e=>{ e.y=level.groundY - (e.type==='tyrant'?46:32); e.vx=(Math.random()<.5?-1:1)*0.9; e.alive=true; });
  level.blocks.forEach(b=>{ b.asked=false; b.used=false; b.bump=0; });
  level.movers = level.movers||[];
  level.movers.forEach(m=>{ m.t=0; m.ox=0; m.oy=0; m._dx=0; m._dy=0; });
  level.spikes = level.spikes||[];
  level.fallers = level.fallers||[];
  level.fallers.forEach(f=>{ f.state='idle'; f.vy=0; f.cy=f.y; f.shake=0; });
  player.x=80; player.y=level.groundY-player.h; player.vx=0; player.vy=0;
  player.canSuper=false; player.invuln=60; player.safeX=80; player.safeY=level.groundY-player.h;
  camX=0; starTimer=0; floaters=[]; particles=[];
  AudioSys.startMusic(104 + i*8);
}
function nextLevel(){
  if(levelIdx+1 < LEVELS.length){ loadLevel(levelIdx+1); state='play'; }
  else state='win';
}

// ---------- HELPERS ----------
function overGap(x){
  for(const g of level.gaps){ if(x>g[0] && x<g[1]) return true; }
  return false;
}
function rectsOverlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
function addFloat(x,y,text,color){ floaters.push({x,y,text,color,life:70}); }
function burst(x,y,color){ for(let i=0;i<10;i++) particles.push({x,y,vx:(Math.random()-.5)*5,vy:-Math.random()*5-1,life:30,color}); }

// ---------- UPDATE ----------
function update(dt){
  if(state!=='play') return;
  const p=player;

  // advance moving platforms (compute this-frame delta so the player can ride them)
  for(const m of level.movers){
    m.t += m.spd;
    const off = m.range * (0.5 - 0.5*Math.cos(m.t));
    const nx = m.axis==='x' ? off : 0;
    const ny = m.axis==='y' ? off : 0;
    m._dx = nx - m.ox; m._dy = ny - m.oy;
    m.ox = nx; m.oy = ny;
  }
  // advance falling blocks (idle -> shake when player underneath -> fall -> rubble)
  for(const f of level.fallers){
    if(f.state==='idle'){
      if(p.x+p.w > f.x-24 && p.x < f.x+f.w+24 && p.y > f.y){ f.state='shake'; f.shake=28; }
    } else if(f.state==='shake'){
      f.shake--; if(f.shake<=0){ f.state='fall'; f.vy=0; }
    } else if(f.state==='fall'){
      f.vy += GRAV; if(f.vy>TERM_VY) f.vy=TERM_VY; f.cy += f.vy;
      if(f.cy + f.h >= level.groundY){ f.cy = level.groundY - f.h; f.state='done'; burst(f.x+f.w/2, f.cy+f.h, '#6b5a3a'); }
    }
  }

  // horizontal input
  let ax=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) { ax-=MOVE_ACC; p.face=-1; }
  if(keys['ArrowRight']||keys['d']||keys['D']){ ax+=MOVE_ACC; p.face=1; }
  p.vx += ax;
  if(ax===0) p.vx*=FRICTION;
  const maxv = charData.speed;
  if(p.vx>maxv) p.vx=maxv; if(p.vx<-maxv) p.vx=-maxv;
  if(Math.abs(p.vx)<0.05) p.vx=0;

  // jump buffering + coyote
  const jumpKey = keys['ArrowUp']||keys['w']||keys['W']||keys[' ']||keys['Space'];
  if(pressed['ArrowUp']||pressed['w']||pressed['W']||pressed[' ']||pressed['Space']) p.jumpBuf=JUMP_BUFFER;
  if(p.jumpBuf>0) p.jumpBuf--;
  if(p.coyote>0) p.coyote--;

  let jumpVel = charData.jump;
  if(p.canSuper) jumpVel += 6.0;
  if(p.jumpBuf>0 && (p.onGround||p.coyote>0)){
    p.vy=-jumpVel; p.onGround=false; p.coyote=0; p.jumpBuf=0;
    burst(p.x+p.w/2,p.y+p.h,'#f2c14e');
    AudioSys.jump();
  }
  // variable jump height (full height once you have the Spring, so gaps stay clearable)
  if(!jumpKey && p.vy<-4 && !p.canSuper) p.vy=-4;

  // gravity
  p.vy+=GRAV; if(p.vy>TERM_VY) p.vy=TERM_VY;

  // integrate X
  p.x+=p.vx;
  if(p.x<0) p.x=0; if(p.x+p.w>level.width) p.x=level.width-p.w;

  // platform collision X (solid platforms + blocks)
  const solids = getSolids();
  for(const s of solids){
    if(rectsOverlap(p,s)){
      if(p.vx>0) p.x=s.x-p.w; else if(p.vx<0) p.x=s.x+s.w;
      p.vx=0;
      if(s.block && !s.block.used) triggerBlock(s.block);
    }
  }

  // integrate Y
  const preLandVy = p.vy;
  const wasGrounded = p.onGround;
  p.y+=p.vy;
  p.onGround=false;
  // ground
  if(!overGap(p.x+p.w/2) && !overGap(p.x+2) && !overGap(p.x+p.w-2)){
    if(p.y+p.h > level.groundY){
      p.y=level.groundY-p.h; p.vy=0; p.onGround=true;
    }
  }
  // platforms / blocks Y
  for(const s of solids){
    if(rectsOverlap(p,s)){
      if(p.vy>0){
        p.y=s.y-p.h; p.vy=0; p.onGround=true;
        if(s.mover){ p.x += s.mover._dx; } // ride horizontal movers
      }
      else if(p.vy<0){
        p.y=s.y+s.h; p.vy=0;
        if(s.block && !s.block.used){ triggerBlock(s.block); }
      }
    }
  }
  if(p.onGround){
    p.coyote=COYOTE; if(!overGap(p.x+p.w/2)){ p.safeX=p.x; p.safeY=p.y; }
    // Mario/Kirby-style landing squash-and-stretch on hard landings
    if(!wasGrounded && preLandVy>7) p.squash=9;
  }
  if(p.squash>0) p.squash--;

  // fell in pit
  if(p.y>H+80){ damage(true); }

  // animation
  if(Math.abs(p.vx)>0.3 && p.onGround) p.anim+=0.25; else p.anim=0;
  if(p.invuln>0) p.invuln--;

  // star timer
  if(starTimer>0){ starTimer-=dt; if(starTimer<0) starTimer=0; }

  // enemies
  for(const e of level.enemies){
    if(!e.alive) continue;
    e.x+=e.vx;
    if(e.x<e.min){ e.x=e.min; e.vx*=-1; }
    if(e.x>e.max){ e.x=e.max; e.vx*=-1; }
    const eb={x:e.x,y:e.y,w:(e.type==='tyrant'?32:28),h:(e.type==='tyrant'?46:32)};
    if(rectsOverlap(p,eb)){
      const stomping = p.vy>0 && (p.y+p.h) < e.y+18;
      if(starTimer>0){
        e.alive=false; score+=150; burst(e.x,e.y,'#f2c14e'); addFloat(e.x,e.y-10,'+150','#f2c14e');
        AudioSys.stomp();
      } else if(e.type==='redcoat' && stomping){
        e.alive=false; score+=100; p.vy=-8; burst(e.x,e.y,'#c0392b'); addFloat(e.x,e.y-10,'+100','#fff');
        AudioSys.stomp();
      } else if(e.type==='tyrant' && stomping){
        // can't stomp a tyrant without a star -> bounce + damage
        p.vy=-6; damage(false);
      } else {
        damage(false);
      }
    }
  }

  // spikes (static hazard): cost a heart + knockback
  for(const sp of level.spikes){
    if(rectsOverlap(p, sp)) damage(false);
  }
  // falling blocks: only dangerous while actually falling
  for(const f of level.fallers){
    if(f.state==='fall' && rectsOverlap(p, {x:f.x,y:f.cy,w:f.w,h:f.h})) damage(false);
  }

  // coin blocks can also be triggered by side contact (friendlier)
  for(const b of level.blocks){
    if(b.bump>0) b.bump--;
    if(b.used||b.gate) continue;
    const bb={x:b.x,y:b.y,w:b.w,h:b.h};
    if(rectsOverlap(p,bb)) triggerBlock(b);
  }

  // goal
  if(p.x > level.goalX){ score+=500; state='levelclear'; AudioSys.flag(); }

  // camera
  camX = p.x + p.w/2 - W*0.4;
  if(camX<0) camX=0; if(camX>level.width-W) camX=level.width-W;

  // floaters/particles
  floaters.forEach(f=>{ f.y-=0.6; f.life--; });
  floaters=floaters.filter(f=>f.life>0);
  particles.forEach(pt=>{ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.3; pt.life--; });
  particles=particles.filter(pt=>pt.life>0);

  // clear one-frame pressed
  for(const k in pressed) pressed[k]=false;
}

function getSolids(){
  const arr=[];
  for(const pl of level.platforms) arr.push({x:pl.x,y:pl.y,w:pl.w,h:pl.h});
  for(const b of level.blocks){ if(!b.used) arr.push({x:b.x,y:b.y,w:b.w,h:b.h,block:b}); }
  if(level.steps){ for(const s of level.steps) arr.push({x:s.x0,y:s.y,w:s.x1-s.x0,h:level.groundY-s.y+80}); }
  if(level.movers){ for(const m of level.movers) arr.push({x:m.x+m.ox,y:m.y+m.oy,w:m.w,h:m.h,mover:m}); }
  return arr;
}

function damage(fell){
  const p=player;
  if(p.invuln>0 && !fell) return;
  hearts--; p.invuln=90;
  burst(p.x+p.w/2,p.y+p.h/2,'#c0392b');
  if(hearts<=0){ state='gameover'; AudioSys.gameover(); return; }
  AudioSys.hurt();
  if(fell){
    p.x=p.safeX; p.y=p.safeY-4; p.vx=0; p.vy=0;
  } else {
    p.vy=-6; p.vx=-p.face*4;
  }
}

// ---------- QUESTIONS ----------
function triggerBlock(b){
  if(b.used||b.asked) return;
  b.asked=true; b.bump=8;
  const q = pickQuestion(level.doc);
  let elim = -1;
  if(charData.perk==='eliminate'){
    // remove one wrong option (stable for this question)
    const wrong = [0,1,2,3].filter(i=>i!==q.a);
    elim = wrong[Math.floor(Math.random()*wrong.length)];
  }
  questionData = { block:b, q, elim, reveal:null };
  qHover=-1;
  AudioSys.select();
  state='question';
}
function pickQuestion(doc){
  // difficulty ramps with total answered across the game
  let tier = 1;
  if(answeredCount>=5) tier=2;
  if(answeredCount>=10) tier=3;
  const pool = QBANK[doc];
  const key = (i)=> doc+'#'+i;   // unambiguous separator so '...#1' != '...#12'
  // candidate indices: unused at target tier, else any unused, else reset
  let idxs = pool.map((q,i)=>i).filter(i=>pool[i].t===tier && !usedQ.has(key(i)));
  if(!idxs.length) idxs = pool.map((q,i)=>i).filter(i=>!usedQ.has(key(i)));
  if(!idxs.length){ usedQ.clear(); idxs = pool.map((q,i)=>i); }
  const idx = idxs[Math.floor(Math.random()*idxs.length)];
  usedQ.add(key(idx));
  return pool[idx];
}
function answerQuestion(idx){
  const b=questionData.block, q=questionData.q;
  if(idx===q.a){
    b.used=true; b.asked=true;
    answeredCount++; score+=200;
    AudioSys.correct();
    addFloat(b.x, b.y+ (b.gate?120:-20), 'CORRECT!', '#7bd47b');
    burst(b.x+b.w/2, b.gate?400:b.y, '#7bd47b');
    if(hearts<charData.maxHearts){
      hearts++;
      addFloat(b.x, b.y+(b.gate?150:8), '+1 HEART', '#e0364e');
    }
    grantReward(b.reward, b);
    questionData=null;
    state='play';
  } else {
    // teaching moment: reveal the correct answer; consequences wait for resolveWrong()
    AudioSys.wrong();
    questionData.reveal = idx;
  }
}
function resolveWrong(){
  const b=questionData.block;
  if(b.gate){
    // mastery gate: costs a heart, knock back, and try again
    hearts--; player.invuln=70;
    player.vx=-6; player.x-=10; player.vy=-5;
    b.asked=false; // re-triggerable
    addFloat(b.x, b.y+120, 'TRY AGAIN', '#e06666');
    if(hearts<=0){ state='gameover'; AudioSys.gameover(); questionData=null; return; }
  } else {
    b.used=true; // optional coin block is consumed
    addFloat(b.x, b.y-20, 'MISSED', '#e06666');
  }
  questionData=null;
  state='play';
}
function grantReward(type,b){
  const fy = b.gate ? 360 : b.y-42;
  if(type==='spring'){ player.canSuper=true; AudioSys.spring(); addFloat(b.x,fy,'LIBERTY SPRING!','#8ab0e6'); }
  else if(type==='star'){ starTimer=STAR_TIME; AudioSys.star(); addFloat(b.x,fy,'LIBERTY STAR!','#f2c14e'); }
  else { score+=100; AudioSys.coin(); addFloat(b.x,fy,'+100 COIN','#f2c14e'); }
}

// ---------- PIXEL DRAW HELPERS ----------
function px(x,y,w,h,color){ ctx.fillStyle=color; ctx.fillRect(Math.round(x),Math.round(y),w,h); }

function drawFounder(sx,sy,cd,face,walkFrame,flash,squash){
  // 26x34 stylized 8-bit colonial figure, drawn larger (visual only, hitbox unchanged)
  const SPRITE_SCALE = 1.5;
  // Mario/Kirby-style squash-and-stretch: briefly wide+flat on a hard landing, anchored at the feet
  const sqz = squash>0 ? squash/9 : 0;
  const scaleX = SPRITE_SCALE * (1 + sqz*0.22), scaleY = SPRITE_SCALE * (1 - sqz*0.22);
  ctx.save();
  ctx.translate(sx,sy);
  ctx.translate(13,34);
  ctx.scale(scaleX,scaleY);
  ctx.translate(-13,-34);
  if(face<0){ ctx.translate(26,0); ctx.scale(-1,1); }
  const skin='#e8b98f', skinSh='#cf9d73', wig='#f3f0e6', wigSh='#d3cfc0', coat=cd.coat, coatSh=shade(coat,-18), acc=cd.accent, boot='#2a2320', breech='#d9cdae', ol='#20160e';
  if(flash){ ctx.globalAlpha=0.5; }
  // boots / legs (walk anim), 4-phase gait: neutral, forward, neutral, back

function drawBlock(b){
  const x=b.x-camX;
  if(x+b.w<0||x>W) return;
  if(b.gate){
    // full-height portcullis pillar
    if(b.used){
      // opened: faint archway posts on the sides only
      px(x,GATE_Y,6,GATE_H,'#4a5a34'); px(x+b.w-6,GATE_Y,6,GATE_H,'#4a5a34');
      return;
    }
    const col = b.reward==='star' ? '#7a5aa8' : (b.reward==='spring' ? '#3d6ab0' : '#c98a24');
    const lite = b.reward==='star' ? '#b48fe0' : (b.reward==='spring' ? '#7aa6e6' : '#f2c14e');
    px(x,GATE_Y,b.w,GATE_H,col);
    for(let yy=GATE_Y; yy<GATE_Y+GATE_H; yy+=20){ px(x+4,yy,b.w-8,10,lite); }
    px(x,GATE_Y,b.w,6,'#0d1526'); px(x,GATE_Y+GATE_H-6,b.w,6,'#0d1526');
    // ? sign near eye level
    const cy=300;
    px(x+2,cy-24,b.w-4,48,'#0d1526');
    ctx.fillStyle=lite; ctx.font='24px "Press Start 2P"'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('?', x+b.w/2, cy+2);
    ctx.textBaseline='alphabetic';
    return;
  }
  const y=b.y - (b.bump>0?4:0);
  if(b.used){
    px(x,y,40,40,'#6b5a3a'); px(x+2,y+2,36,36,'#877249');
  } else {
    px(x,y,40,40,'#c98a24'); px(x+3,y+3,34,34,'#f2c14e');
    px(x+3,y+3,34,4,'#ffe8a3'); px(x+3,y+33,34,4,'#a9741c');
  }
  ctx.fillStyle=b.used?'#5a4a2e':'#5a3a10';
  ctx.font='20px "Press Start 2P"'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(b.used?'':'?', x+20, y+22);
  ctx.textBaseline='alphabetic';
}

// ---------- RENDER ----------
// Rolling hill silhouette that anchors a skyline row to the horizon. Drawn full-width and
// independent of level.gaps, so buildings always sit on continuous ground, even when a
// foreground pit passes underneath them, instead of appearing to float over the gap.
function drawHillBand(scroll, baseY, color){
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, H + 4);
  const step = 20;
  for(let x=0; x<=W; x+=step){
    const wx = x + scroll;
    // bump is always >=0 so the fill top never dips below baseY, guarantees the band
    // always fully covers the strip under the buildings, gap or no gap, with no seam.
    const bump = Math.abs(Math.sin(wx*0.010))*10 + Math.abs(Math.sin(wx*0.027 + 1.4))*6;
    ctx.lineTo(x, baseY - bump);
  }
  ctx.lineTo(W, H + 4);
  ctx.closePath();
  ctx.fill();
}
// Weathered split-rail fence marking the town's edge fields; purely decorative,
// drawn just above the horizon line so the ground fill below it stays untouched.
function drawFence(scroll, y, color){
  const spacing = 46;
  const startPost = Math.floor(scroll/spacing) - 1;
  ctx.fillStyle = color;
  for(let i=startPost; i<startPost + Math.ceil(W/spacing) + 2; i++){
    const x = i*spacing - scroll;
    if(x < -spacing || x > W+spacing) continue;
    px(x, y-14, 3, 14, color);           // post
    px(x, y-11, spacing-4, 3, color);    // upper rail
    px(x, y-4, spacing-4, 3, color);     // lower rail
  }
}
// Parallax colonial-Philadelphia skyline. scroll = already-parallaxed camera offset,
// baseY = building baseline (buildings extend from here up; kept near the ground so the
// city sits right behind the characters with no empty filler band), col = building fill.
function drawColonialSkyline(scroll, baseY, col, landmark){
  const TILE = 620;                       // width of one repeating streetscape
  const roofL = shade(col, 16), win = shade(col, -26), trim = shade(col, 26), litWin = shade(col,-40);
  const CLAP = '#cfc4a3', CLAP_TRIM = '#5b6b7a';  // weathered white clapboard + slate-blue shutters
  const startTile = Math.floor(scroll / TILE) - 1;
  for(let ti=startTile; ti<startTile + Math.ceil(W/TILE)+2; ti++){
    const ox = ti*TILE - scroll;          // left edge of this tile on screen
    if(ox > W || ox+TILE < 0) continue;

    // helper: a rowhouse with a peaked roof, day-lit window panes, a chimney.
    // variant 'clapboard' swaps the brick fill for a white clapboard + slate-blue-shutter look.
    const house=(x,w,h,peak,variant)=>{
      const top=baseY-h;
      const bodyCol = variant==='clapboard' ? CLAP : col;
      const roofCol = variant==='clapboard' ? shade(CLAP,-38) : roofL;
      const winCol  = variant==='clapboard' ? '#33343a' : win;
      const trimCol = variant==='clapboard' ? CLAP_TRIM : trim;
      px(x, top, w, h, bodyCol);
      px(x, top, w, 3, trimCol);                       // eave line
      px(x, top, 2, h, shade(bodyCol,10));              // sunlit left edge
      px(x+w-2, top, 2, h, shade(bodyCol,-14));         // shaded right edge
      if(peak){ // gabled roof
        ctx.fillStyle=roofCol;
        ctx.beginPath(); ctx.moveTo(x-2,top); ctx.lineTo(x+w/2,top-14); ctx.lineTo(x+w+2,top); ctx.closePath(); ctx.fill();
      } else { px(x-1, top-5, w+2, 5, roofCol); }      // flat parapet
      px(x+w-6, top-10, 4, 12, shade(bodyCol,-18));      // chimney
      // day window panes (dark glass with a light sill); clapboard homes get slate shutters
      for(let wy=top+8; wy<baseY-8; wy+=16){
        for(let wx=x+5; wx<x+w-6; wx+=13){
          px(wx,wy,5,7,winCol); px(wx,wy+7,5,1,trimCol);
          if(variant==='clapboard'){ px(wx-2,wy,2,7,trimCol); px(wx+5,wy,2,7,trimCol); }
        }
      }
    };
    // a single-canopy oak/elm tree, anchored at the street baseline
    const tree=(x,scale)=>{
      const s=scale||1, trunkH=24*s, cy=baseY-trunkH-10*s;
      px(x-3*s, baseY-trunkH, 6*s, trunkH, '#5a4530');
      ctx.fillStyle='#4f6b46';
      ctx.beginPath();
      ctx.arc(x,cy,15*s,0,7); ctx.arc(x-11*s,cy+5*s,11*s,0,7); ctx.arc(x+11*s,cy+5*s,11*s,0,7);
      ctx.fill();
      ctx.fillStyle=shade('#4f6b46',12);
      ctx.beginPath(); ctx.arc(x-4*s,cy-5*s,7*s,0,7); ctx.fill();
    };
    // a meeting house / church with a modest steeple (low colonial proportions, not a modern tower)
    const church=(x)=>{
      const h=70, top=baseY-h;
      px(x, top, 34, h, col); px(x,top,34,3,trim);
      px(x,top,2,h,shade(col,10)); px(x+32,top,2,h,shade(col,-14));
      // steeple
      px(x+12, top-22, 10, 22, col);
      px(x+13, top-33, 8, 11, roofL);
      ctx.fillStyle=roofL; ctx.beginPath(); ctx.moveTo(x+11,top-33); ctx.lineTo(x+17,top-47); ctx.lineTo(x+23,top-33); ctx.closePath(); ctx.fill();
      px(x+16, top-53, 2, 8, trim);                 // spire finial
      for(let wy=top+10; wy<baseY-10; wy+=20){ px(x+8,wy,6,9,win); px(x+20,wy,6,9,win); }
    };

    // lay out one streetscape across the tile: low 2-3 story colonial rowhouses along a town street
    house(ox+10, 70, 68, true, 'clapboard');
    house(ox+90, 54, 84, false);
    church(ox+160);
    house(ox+210, 80, 74, true);
    house(ox+300, 60, 90, false, 'clapboard');

    if(landmark){
      // ---- Independence Hall (centerpiece) ----
      const bx=ox+380, bH=118, bTop=baseY-bH;
      px(bx, bTop, 150, bH, col);                     // long brick body
      px(bx, bTop, 150, 4, trim);
      px(bx,bTop,2,bH,shade(col,10)); px(bx+148,bTop,2,bH,shade(col,-14));
      // rows of windows
      for(let wy=bTop+14; wy<baseY-16; wy+=26){
        for(let wx=bx+12; wx<bx+140; wx+=20){ px(wx,wy,8,12,win); px(wx,wy+12,8,1,trim); }
      }
      // central clock tower
      const tx=bx+62, tw=26;
      px(tx, bTop-34, tw, 34, col); px(tx,bTop-34,tw,3,trim);
      px(tx+8, bTop-24, 10, 10, '#f7ecd0'); px(tx+11,bTop-21,4,4,'#3a2f1a'); // clock face + hands
      // white steeple stages
      px(tx+3, bTop-58, tw-6, 24, roofL);
      px(tx+6, bTop-76, tw-12, 18, roofL);
      ctx.fillStyle=roofL;
      ctx.beginPath(); ctx.moveTo(tx+4,bTop-76); ctx.lineTo(tx+tw/2,bTop-104); ctx.lineTo(tx+tw-4,bTop-76); ctx.closePath(); ctx.fill();
      px(tx+tw/2-1, bTop-116, 2, 12, trim);           // spire
      tree(ox+358, 0.85); tree(ox+562, 0.95);         // elms flanking the green out front
    } else {
      house(ox+380, 90, 88, true, 'clapboard');
      church(ox+490);
      house(ox+540, 60, 76, false);
      tree(ox+601, 1);
    }
  }
}

// lighten/darken a #rrggbb hex by amount (-100..100)
function shade(hex, amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  const f=amt/100*255;
  r=Math.max(0,Math.min(255,r+f)); g=Math.max(0,Math.min(255,g+f)); b=Math.max(0,Math.min(255,b+f));
  return '#'+((1<<24)+(Math.round(r)<<16)+(Math.round(g)<<8)+Math.round(b)).toString(16).slice(1);
}
// textured dirt+grass ground block (used for flat ground and raised steps/hills)
function drawGround(x, y, w, h){
  px(x,y,w,h,'#3e2f1c');                         // dirt base
  // dirt speckle texture (deterministic by world column so it doesn't shimmer)
  ctx.fillStyle='rgba(0,0,0,.14)';
  const worldX=Math.round(x+camX);
  for(let ix=0; ix<w; ix+=8){
    const wx=worldX+ix; const jitter=((wx*13)%17);
    ctx.fillRect(x+ix+ (jitter%4), y+18+ (jitter%3)*6, 3, 3);
    ctx.fillRect(x+ix+2+ (jitter%5), y+40+ (jitter%4)*7, 2, 2);
  }
  ctx.fillStyle='rgba(255,255,255,.05)';
  for(let ix=0; ix<w; ix+=14){ ctx.fillRect(x+ix, y+22+((worldX+ix)*7%20), 2, 2); }
  // grass cap with a highlighted crest and blade edge
  px(x,y,w,10,'#5c7a3a');
  px(x,y,w,3,'#749450');                          // lighter crest
  px(x,y+10,w,4,'#3f5628');
  // little grass blades along the top edge
  for(let ix=2; ix<w; ix+=12){ px(x+ix,y-2,2,2,'#6f9147'); px(x+ix+5,y-3,2,3,'#7ba050'); }
}

function render(){
  ctx.clearRect(0,0,W,H);
  if(state==='title'){ drawTitle(); return; }
  if(state==='select'){ drawSelect(); return; }
  if(state==='win'){ drawEnd(true); return; }
  if(state==='gameover'){ drawEnd(false); return; }

  drawWorld();
  if(state==='question') drawQuestion();
  if(state==='levelclear') drawLevelClear();
  drawHUD();
}

function drawWorld(){
  // daytime sky: tinted per-level so each document world reads as its own place
  const skyBase = level.sky || '#4d5f72';
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,shade(skyBase,44)); g.addColorStop(0.5,shade(skyBase,58)); g.addColorStop(1,shade(skyBase,68));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // soft sun glow
  const sunx=W*0.78, suny=90;
  const sg=ctx.createRadialGradient(sunx,suny,10,sunx,suny,150);
  sg.addColorStop(0,'rgba(255,250,220,.9)'); sg.addColorStop(1,'rgba(255,250,220,0)');
  ctx.fillStyle=sg; ctx.fillRect(sunx-160,suny-160,320,320);
  ctx.fillStyle='#fff7dc'; ctx.beginPath(); ctx.arc(sunx,suny,26,0,7); ctx.fill();
  // drifting clouds: poofy Kirby-style puffs (overlapping circles) instead of flat bars
  ctx.fillStyle='rgba(255,255,255,.8)';
  for(let i=0;i<6;i++){
    const cw=90+ (i%3)*26;
    const cx=((i*260 - camX*0.18)%(W+260)+(W+260))%(W+260) - 130;
    const cy=40 + (i*37)%150;
    ctx.beginPath();
    ctx.arc(cx+cw*0.22, cy+7, 11, 0, 7);
    ctx.arc(cx+cw*0.45, cy,    14, 0, 7);
    ctx.arc(cx+cw*0.68, cy+4,  12, 0, 7);
    ctx.arc(cx+cw*0.5,  cy+10, 15, 0, 7);
    ctx.fill();
  }
  // distant rolling hills: continuous horizon band that grounds the far skyline even over gaps
  drawHillBand(camX*0.22, level.groundY-70, shade(level.hills||'#3a4536', -4));
  // colonial skyline, far row (hazy, muted slate-grey, slow parallax, sits high)
  drawColonialSkyline(camX*0.22, level.groundY-70, '#8b8f8f', false);
  // far split-rail fence marking the edge of the town fields, in front of the far skyline
  drawFence(camX*0.3, level.groundY-70, '#5f5342');
  // near hill/foundation band: grounds the near skyline row the same way
  drawHillBand(camX*0.42, level.groundY-6, shade('#8a6248', -32));
  // colonial skyline, near row (muted brick/faded-red, extends down right behind the characters)
  drawColonialSkyline(camX*0.42, level.groundY-6, '#8a6248', true);
  // near split-rail fence, just above the playable ground line
  drawFence(camX*0.6, level.groundY, '#6b573c');
  // atmospheric haze: soft warm fade uniting the background layers so they read
  // as muted and distant, keeping full contrast for the crisp foreground gameplay
  const haze = ctx.createLinearGradient(0,0,0,level.groundY);
  haze.addColorStop(0,'rgba(255,244,224,.04)'); haze.addColorStop(1,'rgba(200,172,132,.16)');
  ctx.fillStyle=haze; ctx.fillRect(0,0,W,level.groundY);
  // ground with gaps
  const gy=level.groundY;
  let cursor=0;
  const segs=[];
  const sorted=[...level.gaps].sort((a,b)=>a[0]-b[0]);
  for(const gp of sorted){ segs.push([cursor,gp[0]]); cursor=gp[1]; }
  segs.push([cursor,level.width]);
  for(const s of segs){
    const x0=s[0]-camX, w=s[1]-s[0];
    if(x0+w<0||x0>W) continue;
    drawGround(x0, gy, w, H-gy);
  }
  // raised ground steps (Mario-style rolling terrain: hills, staircases, dips)
  if(level.steps){
    for(const st of level.steps){
      const x0=st.x0-camX, w=st.x1-st.x0;
      if(x0+w<0||x0>W) continue;
      drawGround(x0, st.y, w, gy-st.y+80);
    }
  }
  // platforms (grass-topped ledges with outline + shaded underside)
  for(const pl of level.platforms){
    const x=pl.x-camX; if(x+pl.w<0||x>W) continue;
    px(x-1,pl.y-1,pl.w+2,pl.h+2,'#241a10');      // dark outline
    px(x,pl.y,pl.w,pl.h,'#8a5a2c');              // dirt
    px(x,pl.y,pl.w,4,'#6f9147');                 // grass top
    px(x,pl.y+4,pl.w,2,'#5c7a3a');
    px(x,pl.y+pl.h-4,pl.w,4,'#5c3a1c');          // shaded underside
    for(let ix=3; ix<pl.w; ix+=10){ px(x+ix,pl.y-2,2,2,'#7ba050'); } // tufts
  }
  // moving platforms (metal-runner look to read as mechanical)
  for(const m of level.movers){
    const x=(m.x+m.ox)-camX, y=m.y+m.oy; if(x+m.w<0||x>W) continue;
    px(x,y,m.w,m.h,'#5a6a82'); px(x,y,m.w,4,'#8fa4c0'); px(x,y+m.h-3,m.w,3,'#3a4658');
    for(let bx=x+4; bx<x+m.w-4; bx+=12){ px(bx,y+m.h/2-1,6,2,'#3a4658'); } // rivet track
  }
  // spikes (upward triangles)
  for(const sp of level.spikes){
    const x=sp.x-camX; if(x+sp.w<0||x>W) continue;
    for(let tx=0; tx<sp.w; tx+=10){
      ctx.fillStyle='#b8b8c0';
      ctx.beginPath(); ctx.moveTo(x+tx, sp.y+sp.h); ctx.lineTo(x+tx+5, sp.y); ctx.lineTo(x+tx+10, sp.y+sp.h); ctx.closePath(); ctx.fill();
    }
    px(x,sp.y+sp.h-3,sp.w,3,'#6a6a72');
  }
  // falling blocks
  for(const f of level.fallers){
    const x=f.x-camX; if(x+f.w<0||x>W) continue;
    const shakeX = f.state==='shake' ? (Math.random()*4-2) : 0;
    if(f.state==='done'){
      px(x, f.cy, f.w, f.h, '#6b5a3a'); // rubble, harmless
    } else {
      const yy = f.state==='fall' ? f.cy : f.y;
      px(x+shakeX, yy, f.w, f.h, '#7a5a3a');
      px(x+shakeX, yy, f.w, 4, '#9a7a4a');
      px(x+shakeX+f.w/2-2, yy+f.h/2-2, 4, 4, '#4a3420');
    }
  }
  // question gates & coin blocks
  for(const b of level.blocks) drawBlock(b);
  // goal flag
  const fx=level.goalX-camX;
  if(fx<W+40){
    px(fx,level.groundY-140,6,140,'#d8d2c0');
    ctx.fillStyle='#c0392b';
    ctx.beginPath(); ctx.moveTo(fx+6,level.groundY-140); ctx.lineTo(fx+56,level.groundY-122); ctx.lineTo(fx+6,level.groundY-104); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('★', fx+30, level.groundY-118);
  }
  // enemies
  for(const e of level.enemies){
    if(!e.alive) continue;
    const sx=e.x-camX; if(sx< -40||sx>W) continue;
    const frame=Math.floor(Date.now()/180);
    if(e.type==='tyrant') drawTyrant(sx,e.y,frame); else drawRedcoat(sx,e.y,frame);
  }
  // particles
  for(const pt of particles){ px(pt.x-camX,pt.y,3,3,pt.color); }
  // player
  const flashing = player.invuln>0 && Math.floor(Date.now()/80)%2===0;
  if(starTimer>0){
    const hue=Math.floor(Date.now()/60)%360;
    ctx.save(); ctx.shadowBlur=16; ctx.shadowColor=`hsl(${hue},90%,60%)`;
    drawFounder(player.x-camX, player.y, charData, player.face, Math.floor(player.anim), false, player.squash);
    ctx.restore();
  } else {
    drawFounder(player.x-camX, player.y, charData, player.face, Math.floor(player.anim), flashing, player.squash);
  }
  // floaters
  ctx.textAlign='center'; ctx.font='10px "Press Start 2P"';
  for(const f of floaters){ ctx.fillStyle=f.color; ctx.fillText(f.text, f.x-camX, f.y); }
  ctx.textAlign='left';
}

function drawHUD(){
  // top bar
  ctx.fillStyle='rgba(10,14,26,.7)'; ctx.fillRect(0,0,W,44);
  // hearts (up to character's max)
  const maxH = charData.maxHearts;
  for(let i=0;i<maxH;i++){
    const hx=14+i*26;
    ctx.fillStyle = i<hearts ? '#e0364e' : '#40202a';
    ctx.fillRect(hx,14,8,8); ctx.fillRect(hx+10,14,8,8); ctx.fillRect(hx+4,20,10,10); ctx.fillRect(hx+6,28,6,6);
  }
  const scoreX = 14 + maxH*26 + 12;
  ctx.fillStyle='#f2c14e'; ctx.font='12px "Press Start 2P"'; ctx.textAlign='left';
  ctx.fillText('SCORE '+score, scoreX, 27);
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.fillText('LVL '+(levelIdx+1)+': '+level.name, W/2, 27);
  // power indicators
  ctx.textAlign='right';
  let px2=W-14;
  if(starTimer>0){ ctx.fillStyle='#f2c14e'; ctx.fillText('★STAR '+Math.ceil(starTimer/1000), px2, 27); }
  else if(player.canSuper){ ctx.fillStyle='#8ab0e6'; ctx.fillText('⬆ SPRING', px2, 27); }
  ctx.textAlign='left';

  // ---- progress strip (level map: gates, goal flag, player marker) ----
  ctx.fillStyle='rgba(10,14,26,.55)'; ctx.fillRect(0,44,W,20);
  const tx=52, tw=W-104, ty=51, th=6;
  ctx.fillStyle='#1c2742'; ctx.fillRect(tx-2,ty-2,tw+4,th+4);
  ctx.fillStyle='#33456e'; ctx.fillRect(tx,ty,tw,th);
  const frac=Math.max(0,Math.min(1,player.x/level.goalX));
  ctx.fillStyle='#f2c14e'; ctx.fillRect(tx,ty,Math.round(tw*frac),th);
  // question-gate markers (colored by reward; dim green once answered)
  for(const b of level.blocks){
    if(!b.gate) continue;
    const gx=tx+tw*Math.min(1,b.x/level.goalX);
    ctx.fillStyle = b.used ? '#4a5a34' : (b.reward==='star'?'#b48fe0':(b.reward==='spring'?'#7aa6e6':'#fff'));
    ctx.fillRect(Math.round(gx)-2,ty-2,4,th+4);
  }
  // goal flag at the end of the track
  ctx.fillStyle='#d8d2c0'; ctx.fillRect(tx+tw,ty-5,2,th+10);
  ctx.fillStyle='#c0392b';
  ctx.beginPath(); ctx.moveTo(tx+tw+2,ty-5); ctx.lineTo(tx+tw+12,ty-1); ctx.lineTo(tx+tw+2,ty+3); ctx.closePath(); ctx.fill();
  // player marker in the character's coat color
  const mx=Math.round(tx+tw*frac);
  ctx.fillStyle='#20160e'; ctx.fillRect(mx-4,ty-4,8,th+8);
  ctx.fillStyle=charData.coat; ctx.fillRect(mx-3,ty-3,6,th+6);
  // speaker icon (click, or press M, to mute)
  ctx.fillStyle='#9fb0d0';
  ctx.fillRect(11,50,4,6);
  ctx.beginPath(); ctx.moveTo(15,50); ctx.lineTo(21,45); ctx.lineTo(21,61); ctx.lineTo(15,56); ctx.closePath(); ctx.fill();
  if(AudioSys.isMuted()){
    ctx.strokeStyle='#e0364e'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(25,47); ctx.lineTo(34,59); ctx.moveTo(34,47); ctx.lineTo(25,59); ctx.stroke();
  } else {
    ctx.fillRect(25,50,2,6); ctx.fillRect(29,47,2,12);
  }
}

function drawQuestion(){
  const q=questionData.q;
  ctx.fillStyle='rgba(6,10,20,.86)'; ctx.fillRect(0,0,W,H);
  // panel
  ctx.fillStyle='#1c2742'; ctx.fillRect(80,90,800,400);
  ctx.strokeStyle='#f2c14e'; ctx.lineWidth=4; ctx.strokeRect(80,90,800,400);
  ctx.fillStyle='#f2c14e'; ctx.font='12px "Press Start 2P"'; ctx.textAlign='center';
  const tierName = q.t===1?'★ EASY':(q.t===2?'★★ MEDIUM':'★★★ HARD');
  ctx.fillText(tierName+'  •  '+level.doc.toUpperCase(), W/2, 130);
  // question (wrapped)
  ctx.fillStyle='#fff'; ctx.font='13px "Press Start 2P"';
  wrapText(q.q, W/2, 180, 720, 22);
  // answers
  const reveal = questionData.reveal;
  for(let i=0;i<4;i++){
    const by=300+i*52;
    const eliminated = (questionData.elim===i);
    const hovered = qHover===i && !eliminated && reveal==null;
    if(eliminated && reveal==null){
      ctx.fillStyle='#171d2e';
      ctx.fillRect(140,by-22,680,44);
      ctx.strokeStyle='#2a3348'; ctx.lineWidth=2; ctx.strokeRect(140,by-22,680,44);
      ctx.fillStyle='#4a5570'; ctx.font='11px "Press Start 2P"'; ctx.textAlign='left';
      ctx.fillText((i+1)+'.  '+q.o[i], 156, by+5);
      ctx.strokeStyle='#4a5570'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(156,by+1); ctx.lineTo(804,by+1); ctx.stroke();
      continue;
    }
    // teaching reveal: correct answer glows green, the wrong pick turns red, rest dim
    let bg, border, numCol='#f2c14e', txtCol='#fff';
    if(reveal!=null){
      if(i===q.a){ bg='#1d4a2b'; border='#7bd47b'; numCol='#7bd47b'; }
      else if(i===reveal){ bg='#4a1d22'; border='#e06666'; numCol='#e06666'; txtCol='#d0a0a8'; }
      else { bg='#171d2e'; border='#2a3348'; numCol='#4a5570'; txtCol='#4a5570'; }
    } else {
      bg = hovered ? '#2f4a7a' : '#233458';
      border = hovered ? '#f2c14e' : '#3f5688';
    }
    ctx.fillStyle=bg;
    ctx.fillRect(140,by-22,680,44);
    ctx.strokeStyle=border; ctx.lineWidth = (reveal!=null && i===q.a) ? 4 : 2;
    ctx.strokeRect(140,by-22,680,44);
    ctx.fillStyle=numCol; ctx.font='12px "Press Start 2P"'; ctx.textAlign='left';
    ctx.fillText((i+1)+'.', 156, by+5);
    ctx.fillStyle=txtCol; ctx.font='11px "Press Start 2P"';
    ctx.fillText(q.o[i], 190, by+5);
    if(reveal!=null && i===q.a){
      ctx.fillStyle='#7bd47b'; ctx.font='9px "Press Start 2P"'; ctx.textAlign='right';
      ctx.fillText('CORRECT', 808, by+5);
      ctx.textAlign='left';
    }
  }
  ctx.textAlign='center'; ctx.font='9px "Press Start 2P"';
  if(reveal!=null){
    ctx.fillStyle='#7bd47b';
    const hint = questionData.block.gate ? 'REMEMBER IT!  TAP / SPACE TO TRY AGAIN (-1 HEART)' : 'REMEMBER IT!  TAP / SPACE TO CONTINUE';
    ctx.fillText(hint, W/2, 516);
  } else {
    ctx.fillStyle='#9fb0d0';
    ctx.fillText('CLICK / TAP  •  OR PRESS 1-4', W/2, 516);
  }
  ctx.textAlign='left';
}
function wrapText(text,cx,y,maxW,lh){
  const words=text.split(' '); let line=''; const lines=[];
  for(const w of words){
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW && line){ lines.push(line); line=w; }
    else line=test;
  }
  if(line) lines.push(line);
  ctx.textAlign='center';
  lines.forEach((l,i)=>ctx.fillText(l,cx,y+i*lh));
}

function drawLevelClear(){
  ctx.fillStyle='rgba(6,10,20,.8)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#7bd47b'; ctx.font='26px "Press Start 2P"';
  ctx.fillText('DOCUMENT SECURED!', W/2, 210);
  ctx.fillStyle='#fff'; ctx.font='13px "Press Start 2P"';
  ctx.fillText('You mastered the '+docTitle(level.doc), W/2, 260);
  ctx.fillStyle='#f2c14e'; ctx.font='14px "Press Start 2P"';
  ctx.fillText('SCORE  '+score, W/2, 320);
  ctx.fillStyle='#9fb0d0'; ctx.font='11px "Press Start 2P"';
  ctx.fillText(levelIdx+1<LEVELS.length?'PRESS SPACE / TAP TO CONTINUE':'PRESS SPACE / TAP', W/2, 380);
  ctx.textAlign='left';
}
function docTitle(d){ return d==='declaration'?'Declaration of Independence':(d==='articles'?'Articles of Confederation':'Constitution'); }

function drawTitle(){
  ctx.fillStyle='#101a30'; ctx.fillRect(0,0,W,H);
  // scanline vibe
  ctx.fillStyle='rgba(255,255,255,.03)';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,2);
  ctx.textAlign='center';
  ctx.fillStyle='#f2c14e'; ctx.font='40px "Press Start 2P"';
  ctx.fillText('FOUNDERS', W/2, 180);
  ctx.fillText('QUEST', W/2, 230);
  ctx.fillStyle='#8ab0e6'; ctx.font='14px "Press Start 2P"';
  ctx.fillText('~ PIXEL REPUBLIC ~', W/2, 275);
  // little founder
  drawFounder(W/2-13, 320, CHARS[0], 1, 0, false);
  ctx.fillStyle=(Math.floor(Date.now()/500)%2)?'#fff':'#f2c14e';
  ctx.font='13px "Press Start 2P"';
  ctx.fillText('PRESS SPACE / TAP TO START', W/2, 430);
  ctx.fillStyle='#5f7099'; ctx.font='9px "Press Start 2P"';
  ctx.fillText('M = SOUND ON / OFF', W/2, 462);
  ctx.fillText('Humanities Immersed Learning', W/2, 500);
  ctx.textAlign='left';
}

function drawSelect(){
  ctx.fillStyle='#101a30'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#f2c14e'; ctx.font='20px "Press Start 2P"';
  ctx.fillText('CHOOSE YOUR FOUNDER', W/2, 90);
  const cardStart = W/2 - ((CHARS.length-1)*240 + 180)/2 + 90;
  for(let i=0;i<CHARS.length;i++){
    const cd=CHARS[i], cx=cardStart+i*240, sel=i===selIndex;
    ctx.fillStyle = sel?'#22345c':'#182640';
    ctx.fillRect(cx-90,150,180,270);
    ctx.strokeStyle = sel?'#f2c14e':'#33456e'; ctx.lineWidth=sel?4:2;
    ctx.strokeRect(cx-90,150,180,270);
    drawFounder(cx-13,180,cd,1,0,false);
    // scale up founder a touch
    ctx.fillStyle='#fff'; ctx.font='12px "Press Start 2P"';
    ctx.fillText(cd.name, cx, 250);
    ctx.fillStyle=cd.accent; ctx.font='9px "Press Start 2P"';
    ctx.fillText(cd.title, cx, 272);
    ctx.fillStyle='#9fb0d0'; ctx.font='8px "Press Start 2P"';
    wrapText(cd.blurb, cx, 300, 160, 16);
    // stats
    ctx.textAlign='center';
    ctx.fillStyle='#e0364e'; ctx.font='8px "Press Start 2P"';
    ctx.fillText('HEARTS '+'\u2665'.repeat(cd.maxHearts), cx, 366);
    ctx.fillStyle='#f2c14e'; ctx.font='8px "Press Start 2P"';
    const perkLabel = cd.perk==='jump' ? 'PERK: HIGH JUMP' : (cd.perk==='hearts' ? 'PERK: EXTRA LIVES' : 'PERK: 50/50 HELP');
    ctx.fillText(perkLabel, cx, 386);
  }
  // start button
  const bs=(Math.floor(Date.now()/500)%2);
  ctx.fillStyle= bs?'#f2c14e':'#c98a24';
  ctx.fillRect(W/2-120,450,240,50);
  ctx.fillStyle='#101a30'; ctx.font='14px "Press Start 2P"';
  ctx.fillText('START  ▶', W/2, 482);
  ctx.fillStyle='#5f7099'; ctx.font='8px "Press Start 2P"';
  ctx.fillText('◀ ▶ TO CHOOSE   •   ENTER / TAP TO START', W/2, 528);
  ctx.textAlign='left';
}

function drawEnd(won){
  ctx.fillStyle= won?'#12321f':'#301418'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  if(won){
    ctx.fillStyle='#7bd47b'; ctx.font='30px "Press Start 2P"';
    ctx.fillText('A REPUBLIC!', W/2, 200);
    ctx.fillStyle='#fff'; ctx.font='12px "Press Start 2P"';
    wrapText('You founded a nation on the Declaration, survived the Articles, and forged the Constitution.', W/2, 250, 720, 24);
  } else {
    ctx.fillStyle='#e0364e'; ctx.font='30px "Press Start 2P"';
    ctx.fillText('GAME OVER', W/2, 210);
    ctx.fillStyle='#fff'; ctx.font='12px "Press Start 2P"';
    ctx.fillText('The union has faltered... try again!', W/2, 260);
  }
  ctx.fillStyle='#f2c14e'; ctx.font='16px "Press Start 2P"';
  ctx.fillText('FINAL SCORE  '+score, W/2, 340);
  ctx.fillStyle=(Math.floor(Date.now()/500)%2)?'#fff':'#9fb0d0'; ctx.font='11px "Press Start 2P"';
  ctx.fillText('PRESS SPACE / TAP FOR TITLE', W/2, 410);
  ctx.textAlign='left';
}

// ---------- LOOP ----------
let last=performance.now();
function loop(now){
  const dt=Math.min(48, now-last); last=now;
  update(dt);
  AudioSys.tick(state);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
</body>
